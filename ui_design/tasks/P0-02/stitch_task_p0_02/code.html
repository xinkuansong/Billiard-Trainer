<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#1a1c1f",
                    "surface-tint": "#1b6c3d",
                    "secondary-fixed-dim": "#aeceb3",
                    "background": "#f9f9fe",
                    "primary": "#005129",
                    "tertiary-fixed-dim": "#ffb2b9",
                    "outline": "#707a70",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bfc9be",
                    "surface-container-high": "#e8e8ed",
                    "surface": "#f9f9fe",
                    "on-secondary-fixed-variant": "#314d38",
                    "primary-container": "#1a6b3c",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#005229",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#ffcace",
                    "on-secondary-container": "#4e6b54",
                    "tertiary-container": "#96434f",
                    "surface-container": "#ededf2",
                    "secondary": "#48654e",
                    "on-primary-container": "#9ae9ae",
                    "inverse-surface": "#2e3034",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f0f0f5",
                    "on-surface-variant": "#404940",
                    "secondary-fixed": "#caebce",
                    "on-secondary-fixed": "#05210f",
                    "tertiary": "#782c38",
                    "primary-fixed-dim": "#89d89e",
                    "surface-variant": "#e2e2e7",
                    "primary-fixed": "#a5f4b8",
                    "tertiary-fixed": "#ffd9dc",
                    "on-tertiary-fixed-variant": "#792d39",
                    "surface-container-low": "#f3f3f8",
                    "secondary-container": "#caebce",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#3f0110",
                    "on-primary-fixed": "#00210d",
                    "inverse-primary": "#89d89e",
                    "surface-dim": "#d9dade",
                    "on-surface": "#1a1c1f",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e2e2e7",
                    "surface-bright": "#f9f9fe"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F2F2F7; /* Specific background requested */
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-status-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            width: 100%;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-start overflow-x-hidden">
<!-- Screen Canvas (iPhone 15 Pro width simulated) -->
<div class="w-[393px] min-h-screen bg-[#F2F2F7] flex flex-col relative shadow-2xl">
<!-- Status Bar -->
<div class="ios-status-bar bg-[#F9F9FE] dark:bg-gray-950">
<span class="text-sm font-semibold text-on-surface">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- TopAppBar (From Shared JSON) -->
<header class="bg-[#F9F9FE] dark:bg-gray-950 w-full sticky top-0 z-40">
<div class="flex items-center justify-between px-5 pt-8 pb-4 w-full">
<h1 class="text-[#005129] dark:text-emerald-500 font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-3xl">训练</h1>
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity tap-highlight-transparent active:scale-95 text-[#005129]">
<span class="material-symbols-outlined" data-icon="group">group</span>
</button>
<button class="hover:opacity-70 transition-opacity tap-highlight-transparent active:scale-95 text-[#005129]">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
</div>
</header>
<!-- Main Content Area (Empty State) -->
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-32">
<!-- Large Training Icon -->
<div class="mb-6 flex items-center justify-center opacity-30 text-[#1A6B3C]">
<span class="material-symbols-outlined" style="font-size: 80px; font-variation-settings: 'wght' 200;">fitness_center</span>
</div>
<!-- Empty State Text -->
<h2 class="text-[22px] font-bold text-on-background text-center mb-3">还没有训练计划</h2>
<p class="text-[15px] text-on-surface-variant text-center opacity-60 max-w-[280px] leading-snug mb-10">
                选择一个训练计划开始练球，或直接自由记录
            </p>
<!-- CTA Buttons -->
<div class="w-full flex flex-col gap-4">
<button class="bg-primary-container text-on-primary font-bold text-[17px] py-4 rounded-xl active:scale-95 transition-transform duration-200 w-full shadow-sm">
                    选择训练计划
                </button>
<button class="text-on-background font-medium text-[17px] py-2 active:opacity-60 transition-opacity w-full">
                    自由记录
                </button>
</div>
</main>
<!-- BottomNavBar (From Shared JSON) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-8 pt-2 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md z-50 border-t border-gray-100 dark:border-gray-800">
<!-- 训练 - Active -->
<a class="flex flex-col items-center justify-center text-[#1A6B3C] dark:text-emerald-400 font-semibold active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">训练</span>
</a>
<!-- 动作库 -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-[#1A6B3C] active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">动作库</span>
</a>
<!-- 角度 -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-[#1A6B3C] active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="straighten">straighten</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">角度</span>
</a>
<!-- 记录 -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-[#1A6B3C] active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">记录</span>
</a>
<!-- 我的 -->
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-[#1A6B3C] active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] font-medium mt-1">我的</span>
</a>
</nav>
<!-- Decorative background imagery for depth (Billiards themed subtle cues) -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] overflow-hidden -z-10">
<div class="absolute -top-10 -right-20 w-64 h-64 rounded-full bg-primary-container"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 rounded-full bg-primary-container"></div>
</div>
</div>
</body></html>
