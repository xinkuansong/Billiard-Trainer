<!DOCTYPE html>

<html class="h-full" lang="zh-CN"><head>
<meta charset="utf-8"/>

                    "surface-container-low": "#f3f3f8",
                    "on-secondary-container": "#4e6b54",
                    "background": "#f9f9fe",
                    "on-primary-fixed-variant": "#005229",
                    "surface-variant": "#e2e2e7",
                    "secondary": "#48654e",
                    "on-surface-variant": "#404940",
                    "secondary-fixed": "#caebce",
                    "primary-fixed": "#a5f4b8",
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#00210d",
                    "on-secondary-fixed-variant": "#314d38",
                    "tertiary": "#782c38",
                    "error-container": "#ffdad6",
                    "primary": "#005129",

                    "on-primary": "#ffffff",
                    "surface-dim": "#d9dade",
                    "inverse-primary": "#89d89e",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffd9dc",
                    "on-background": "#1a1c1f",

<style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#F9F9FE] h-full flex flex-col overflow-hidden text-[#1A1C1F]">
<!-- Status Bar Spacer (Simulated iOS) -->
<div class="h-11 w-full flex items-center justify-between px-6 shrink-0">
<span class="text-[15px] font-semibold tracking-tight">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_5_bar</span>
</div>
</div>
<!-- Top Navigation Anchor (Manual Implementation of JSON Intent) -->
<header class="w-full top-0 sticky flex items-center px-4 h-14">
<!-- Back Button: Specified as Pill/Capsule with #0000000F BG -->
<button class="flex items-center justify-center gap-1 px-4 py-1.5 rounded-full bg-black/5 border border-black/10 transition-transform active:scale-95 duration-150">
<span class="material-symbols-outlined text-[17px] text-[#1A1C1F] font-bold" style="font-variation-settings: 'wght' 700">arrow_back_ios</span>
<span class="text-[17px] text-[#1A1C1F]">返回</span>
</button>
</header>
<!-- Content Canvas -->
<main class="flex-1 flex flex-col pt-4 overflow-hidden">
<!-- Hint Section -->
<section class="px-4 mb-6">
<div class="flex flex-col space-y-1">
<p class="text-[13px] text-[#404940]/60 leading-relaxed font-medium">1、您可以输入一些今天的训练感悟</p>
<p class="text-[13px] text-[#404940]/60 leading-relaxed font-medium">2、还可以记录需要注意的技术要点</p>
</div>
</section>
<!-- Editorial Visual Element (Asymmetric Branding) -->
<!-- Text Editor Area (Tactical Depth) -->
<div class="flex-1 px-4 relative">
<textarea autofocus="" class="w-full h-full bg-transparent border-none focus:ring-0 resize-none text-[18px] leading-relaxed text-[#1A1C1F] placeholder:text-[#404940]/20" placeholder="在此开始记录..."></textarea>
<!-- Subtle Tonal Shift Divider Replacement -->
</div>
</main>
<!-- Bottom Action Bar (Manual Implementation of JSON/Design System Shell) -->
<!-- Fixed above safe area as requested -->
<footer class="w-full px-4 pb-10 pt-4 bg-[#F9F9FE]">
<div class="flex items-center justify-between max-w-screen-xl mx-auto">
<!-- Skip Button -->
<button class="text-[17px] text-[#404940]/60 font-medium px-4 py-2 hover:opacity-80 transition-opacity active:scale-95 duration-150">
                跳过
            </button>
<!-- Done Button: Mapping style_active_navigation and Primary Container -->
<button class="bg-[#1A6B3C] text-white text-[17px] font-semibold px-10 py-3.5 rounded-xl shadow-[0_8pt_16pt_rgba(26,107,60,0.15)] hover:brightness-110 transition-all active:scale-95 duration-150">
                完成
            </button>
</div>
</footer>
<!-- Tactical Training Image Decoration (Corner Accent) -->
<!-- Hidden Navigation Shell (Suppressed as per "Destination Rule" for focused task) -->
<!-- The BottomNavBar and TopAppBar headline are omitted here to focus on the editor experience -->
</body></html>
