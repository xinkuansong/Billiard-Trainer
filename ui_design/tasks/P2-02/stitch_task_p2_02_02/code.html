<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=393px, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                extend: {

                        "tertiary-container": "#96434f",

                        "surface-tint": "#1b6c3d",

                        "on-tertiary-fixed-variant": "#792d39",
                        "tertiary-fixed": "#ffd9dc",
                        "on-background": "#1a1c1f",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#ffddaf",
                        "surface-container-high": "#e8e8ed",
                        "on-secondary": "#ffffff",
                        "secondary": "#805600",
                        "secondary-container": "#fcb73f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3034",
                        "on-primary-fixed": "#00210d",
                        "on-secondary-container": "#6e4900",
                        "tertiary-fixed-dim": "#ffb2b9",
                        "surface": "#f2f2f7",
                        "surface-dim": "#d9dade",
                        "on-surface": "#1a1c1f",
                        "on-secondary-fixed": "#281800",
                        "on-tertiary-container": "#ffcace",
                        "inverse-on-surface": "#f0f0f5",

                        "on-secondary-fixed-variant": "#614000",
                        "primary-container": "#1a6b3c",
                        "surface-bright": "#f9f9fe",
                        "primary-fixed": "#a5f4b8",
                        "inverse-primary": "#89d89e",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#ffba44",
                        "on-tertiary-fixed": "#3f0110",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e2e2e7"
                    },
                    fontFamily: {
                        headline: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    background-color: #f2f2f7;
    width: 393px;
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    vertical-align: middle
    }
.ios-blur {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px)
    }
.grain-texture {
    position: relative
    }
.grain-texture::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.02;
    pointer-events: none;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAqYcI1N7fOYB3pseoteAP_gjE3DfXXnkhWaZbrF7w-cSdboyh-bmztsAoWuYvpnfuFIfrU_uxUZSXyULkqPPsbbAWiWjbDn-U1_J67PFIny4DtI8Ohz5nxX768l9oPe6t3yvGHS4bMSE5PD7J1bigWXToyHWPqqjbYsD3XKkYoEmmfgOIWOt4hFYGHyb5CCPI5ruCBfs9-BlojGgdFr9uELm89QWf97tFS-WgbKYwB2Jq3GorGoSvCK-bm1WneUUPhOZI5993dDI7m)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface">
<!-- Shared Component: TopAppBar -->
<nav class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl docked full-width top-0 sticky z-50 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-1 cursor-pointer active:opacity-70 transition-all">
<span class="material-symbols-outlined text-primary" style="font-size: 22px;">arrow_back</span>
<span class="text-primary font-normal">训练计划</span>
</div>
<h1 class="text-on-surface text-[17px] font-semibold">编辑计划</h1>
<button class="text-emerald-800 dark:text-emerald-400 text-[17px] font-medium hover:opacity-70 active:scale-95 transition-all">保存</button>
</nav>
<main class="pb-32 px-4 pt-6 space-y-6">
<!-- Plan Info Section -->
<section class="bg-surface-container-lowest rounded-xl p-4 space-y-3">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">edit</span>
</div>
<div>
<h2 class="text-[17px] font-semibold text-on-surface">我的台球日常</h2>
<p class="text-[13px] text-on-surface-variant">12 组  4 动作</p>
</div>
</div>
</section>
<!-- Weekly Training Config -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden">
<div class="flex justify-between items-center px-4 py-3">
<span class="text-[17px] font-medium text-on-surface">每周训练天数</span>
<div class="flex items-center bg-surface-container rounded-lg p-1 gap-4">
<button class="w-8 h-8 flex items-center justify-center text-primary active:opacity-50 transition-opacity">
<span class="material-symbols-outlined text-xl">remove</span>
</button>
<span class="text-[17px] font-semibold text-primary w-4 text-center">5</span>
<button class="w-8 h-8 flex items-center justify-center text-primary active:opacity-50 transition-opacity">
<span class="material-symbols-outlined text-xl">add</span>
</button>
</div>
</div>
</section>
<!-- Drill List Section -->
<section class="space-y-2">
<h3 class="text-[13px] uppercase tracking-wider text-on-surface-variant font-medium px-1">训练项目</h3>
<div class="bg-surface-container-lowest rounded-xl overflow-hidden">
<!-- Row 1 -->
<div class="flex items-center gap-4 p-4 active:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant/40 cursor-grab">drag_handle</span>
<div class="w-14 h-14 rounded-lg bg-[#1B6B3A] border-4 border-[#7B3F00] relative overflow-hidden flex items-center justify-center grain-texture">
<div class="absolute w-2 h-2 bg-white rounded-full top-1/2 left-1/3 shadow-sm"></div>
<div class="absolute w-2 h-2 bg-red-600 rounded-full top-1/2 right-1/3 shadow-sm"></div>
</div>
<div class="flex-1">
<h4 class="text-[17px] font-semibold text-on-surface">直线准度练习</h4>
<p class="text-[13px] text-on-surface-variant">4 组 · 20 球</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer">settings</span>
</div>
<div class="h-px bg-surface-variant/50 ml-20"></div>
<!-- Row 2 -->
<div class="flex items-center gap-4 p-4 active:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant/40 cursor-grab">drag_handle</span>
<div class="w-14 h-14 rounded-lg bg-[#1B6B3A] border-4 border-[#7B3F00] relative overflow-hidden flex items-center justify-center grain-texture">
<div class="absolute w-2 h-2 bg-white rounded-full bottom-4 left-1/4 shadow-sm"></div>
<div class="absolute w-2 h-2 bg-yellow-400 rounded-full top-4 right-1/4 shadow-sm"></div>
</div>
<div class="flex-1">
<h4 class="text-[17px] font-semibold text-on-surface">中袋切球训练</h4>
<p class="text-[13px] text-on-surface-variant">3 组 · 15 球</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer">settings</span>
</div>
<div class="h-px bg-surface-variant/50 ml-20"></div>
<!-- Row 3 -->
<div class="flex items-center gap-4 p-4 active:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant/40 cursor-grab">drag_handle</span>
<div class="w-14 h-14 rounded-lg bg-[#1B6B3A] border-4 border-[#7B3F00] relative overflow-hidden flex items-center justify-center grain-texture">
<div class="absolute w-2 h-2 bg-white rounded-full top-4 left-1/2 -translate-x-1/2 shadow-sm"></div>
<div class="absolute w-2 h-2 bg-blue-600 rounded-full bottom-4 left-1/2 -translate-x-1/2 shadow-sm"></div>
</div>
<div class="flex-1">
<h4 class="text-[17px] font-semibold text-on-surface">低杆拉球练习</h4>
<p class="text-[13px] text-on-surface-variant">3 组 · 10 球</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer">settings</span>
</div>
<div class="h-px bg-surface-variant/50 ml-20"></div>
<!-- Row 4 -->
<div class="flex items-center gap-4 p-4 active:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant/40 cursor-grab">drag_handle</span>
<div class="w-14 h-14 rounded-lg bg-[#1B6B3A] border-4 border-[#7B3F00] relative overflow-hidden flex items-center justify-center grain-texture">
<div class="absolute w-1.5 h-1.5 bg-white rounded-full top-3 left-3 opacity-60"></div>
<div class="absolute w-2 h-2 bg-white rounded-full top-8 left-8 shadow-sm"></div>
<div class="absolute w-2 h-2 bg-black rounded-full bottom-4 right-4 shadow-sm border border-zinc-400"></div>
</div>
<div class="flex-1">
<h4 class="text-[17px] font-semibold text-on-surface">走位路线训练</h4>
<p class="text-[13px] text-on-surface-variant">2 组 · 12 球</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer">settings</span>
</div>
</div>
</section>
<!-- Add Button Card -->
<button class="w-full bg-surface-container-lowest rounded-xl p-4 flex items-center justify-center gap-2 hover:bg-surface-container transition-colors active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="text-[17px] font-medium text-primary">添加训练项目</span>
</button>
</main>
<!-- Shared Component: BottomNavBar -->
<footer class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl docked full-width bottom-0 z-50 rounded-t-2xl shadow-[0_-4px_24px_rgba(26,107,60,0.06)] flex justify-around items-center px-4 pt-2 pb-8">
<!-- Item: Color -->
<div class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 px-3 py-1 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[24px]">palette</span>
<span class="text-[11px] font-bold uppercase tracking-wider mt-1">配色</span>
</div>
<!-- Item: Start -->
<div class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 px-3 py-1 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[24px]">play_circle</span>
<span class="text-[11px] font-bold uppercase tracking-wider mt-1">开始训练</span>
</div>
<!-- Item: Add Drill (Active State) -->
<div class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/30 text-emerald-900 dark:text-emerald-100 rounded-xl px-4 py-2 active:scale-90 duration-200 ease-out cursor-pointer">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="text-[11px] font-bold uppercase tracking-wider mt-0.5">添加动作</span>
</div>
<!-- Item: Capacity -->
<div class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 px-3 py-1 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors cursor-pointer">
<span class="text-[20pt] font-bold text-black leading-none mb-1">960</span>
<span class="text-[11px] font-bold uppercase tracking-wider mt-1">容量</span>
</div>
</footer>
</body></html>
