<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1a1c1f",
                        "surface-container-high": "#e8e8ed",
                        "on-tertiary-fixed-variant": "#005227",
                        "tertiary-container": "#1b6b3a",
                        "on-primary-fixed-variant": "#005229",
                        "surface-dim": "#d9dade",
                        "primary-container": "#1a6b3c",
                        "on-primary-fixed": "#00210d",
                        "surface-container-highest": "#e2e2e7",
                        "secondary-fixed": "#ffdcc4",
                        "secondary": "#8e4e11",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#fda865",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e7",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f3f3f8",
                        "inverse-surface": "#2e3034",
                        "surface-tint": "#1b6c3d",
                        "tertiary-fixed": "#a5f4b6",
                        "outline": "#707a70",
                        "primary-fixed-dim": "#89d89e",
                        "surface-bright": "#f9f9fe",
                        "inverse-on-surface": "#f0f0f5",
                        "tertiary": "#005127",
                        "on-background": "#1a1c1f",
                        "on-secondary-container": "#753c00",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-primary": "#89d89e",
                        "on-tertiary-container": "#9ae9ab",
                        "on-surface-variant": "#404940",
                        "surface": "#f9f9fe",
                        "surface-container": "#ededf2",
                        "secondary-fixed-dim": "#ffb780",
                        "on-primary-container": "#9ae9ae",
                        "background": "#f9f9fe",
                        "outline-variant": "#bfc9be",
                        "on-tertiary-fixed": "#00210c",
                        "on-secondary-fixed-variant": "#6f3800",
                        "tertiary-fixed-dim": "#8ad89c",
                        "on-secondary-fixed": "#2f1400",
                        "primary": "#005129",
                        "primary-fixed": "#a5f4b8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .billiard-table {
            aspect-ratio: 2 / 1;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.2);
        }
        .ball-shadow {
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#F2F2F7] min-h-screen flex flex-col items-center">
<!-- Status Bar Spacer (54pt) -->
<div class="h-[54px] w-full"></div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#FFFFFF] flex items-center justify-between px-4 h-14 shadow-sm dark:shadow-none">
<div class="flex items-center gap-1 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#1A6B3C] text-[17px]">arrow_back_ios</span>
<span class="text-[#1A6B3C] text-[17px] font-normal">角度训练</span>
</div>
<h1 class="font-bold text-[17px] tracking-tight text-emerald-950 dark:text-emerald-50">角度测试</h1>
<div class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[rgba(60,60,67,0.45)] text-[22px]">help</span>
</div>
</header>
<main class="w-full max-w-[393px] px-4 flex flex-col gap-6 pt-4">
<!-- Progress Indicator -->
<section class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-[15px] font-semibold text-on-surface">第 8 题</span>
<span class="text-[15px] text-[rgba(60,60,67,0.6)]">共 20 题</span>
</div>
<div class="w-full h-[6px] bg-surface-container-highest overflow-hidden">
<div class="h-full bg-primary-container" style="width: 40%"></div>
</div>
</section>
<!-- Billiard Table Canvas (The Shot Map) -->
<section class="bg-surface-container-lowest p-3 rounded-[16px] shadow-[0_2pt_8pt_rgba(0,0,0,0.06)]">
<div class="relative w-full billiard-table bg-tertiary-container rounded-[12px] border-[8px] border-[#8e4e11] overflow-hidden">
<!-- Pockets -->
<!-- Corners -->
<div class="absolute top-[-7px] left-[-7px] w-[28px] h-[28px] bg-[#111111] rounded-full"></div>
<div class="absolute top-[-7px] right-[-7px] w-[28px] h-[28px] bg-[#111111] rounded-full"></div>
<div class="absolute bottom-[-7px] left-[-7px] w-[28px] h-[28px] bg-[#111111] rounded-full"></div>
<div class="absolute bottom-[-7px] right-[-7px] w-[28px] h-[28px] bg-[#111111] rounded-full"></div>
<!-- Middle Pockets (Longer sides) -->
<div class="absolute top-[-10px] left-1/2 -translate-x-1/2 w-[28px] h-[28px] bg-[#111111] rounded-full"></div>
<div class="absolute bottom-[-10px] left-1/2 -translate-x-1/2 w-[28px] h-[28px] bg-[#111111] rounded-full"></div>
<!-- Visual Guides -->
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<!-- Dashed Arc Guide (Conceptual path between balls) -->
<path d="M 108 119 Q 150 90 198 51" fill="none" stroke="rgba(26,107,60,0.3)" stroke-dasharray="4 4" stroke-width="2"></path>
<!-- Target Pocket Arrow (Pointing to top-right) -->
<g transform="translate(325, 25) rotate(-35)">
<path d="M 0 0 L 24 0 M 24 0 L 16 -6 M 24 0 L 16 6" fill="none" stroke="#C62828" stroke-width="3"></path>
</g>
</svg>
<!-- Balls -->
<!-- Target Ball (Orange) @ 55% left, 30% top -->
<div class="absolute ball-shadow" style="left: 55%; top: 30%; transform: translate(-50%, -50%);">
<div class="w-[24px] h-[24px] bg-[#F5A623] rounded-full relative border border-black/10">
<div class="absolute top-1 left-1.5 w-2 h-1.5 bg-white/40 rounded-full blur-[1px]"></div>
</div>
</div>
<!-- Cue Ball (White) @ 30% left, 70% top -->
<div class="absolute ball-shadow" style="left: 30%; top: 70%; transform: translate(-50%, -50%);">
<div class="w-[24px] h-[24px] bg-[#F5F5F5] rounded-full relative border border-black/10">
<div class="absolute top-1 left-1.5 w-2 h-1.5 bg-white/60 rounded-full blur-[1px]"></div>
</div>
</div>
</div>
</section>
<!-- Input Area -->
<section class="flex flex-col items-center gap-4 mt-2">
<h2 class="text-[17px] font-semibold text-on-surface">请估算切入角度</h2>
<div class="w-[180px] h-[64px] bg-surface-container-lowest border-2 border-primary-container rounded-[16px] flex items-center justify-center gap-1 shadow-sm">
<span class="text-[36px] font-bold text-on-surface tracking-tight">35</span>
<span class="text-[24px] font-normal text-on-surface-variant translate-y-[-4px]">°</span>
</div>
<p class="text-[13px] text-[rgba(60,60,67,0.45)]">范围: 5° - 85°</p>
</section>
<!-- Action Button -->
<footer class="flex justify-center mt-4 mb-8">
<button class="w-[200px] h-[50px] bg-primary-container text-on-primary font-semibold text-[17px] rounded-[12px] active:scale-95 transition-transform shadow-[0_2pt_8pt_rgba(0,0,0,0.06)]">
                确认
            </button>
</footer>
</main>
<!-- Invisible Image Prompt for Aesthetic Context -->
<div class="hidden">
<img data-alt="close-up of a professional pool table with vibrant green felt, mahogany wood rails, and bright studio lighting focusing on a cue ball" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbJQaULwk87qU-R--mc8G5V6AIqncN2rvySafKBMPUzNWp3lvxPMv51IJNYYF7eksyBTSaL6dOtLaTYcdK37uLJV8V0Te8RBXiKuTEKj5fey6Fm8LAG9UuGCIcX_kx0VrvpvbqsEBJB652_uZMR9qJMkE1Qr1wt7tmpHjF471bSkxb-nzB2M45h8llN8F6rjq9Q66l4i3E1pV6xUKV0w1Mavr1hwrbwB8zYP4Y6F-AdJj6Ul0_dwYI6qWtYUT4PQj58qrCs9ZzYTYQ"/>
</div>
</body></html>
