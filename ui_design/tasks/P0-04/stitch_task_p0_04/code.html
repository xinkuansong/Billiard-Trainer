<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Training — Single Drill Recording</title>

<style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9fe; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
        }
        .mono-timer {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface">
<!-- Top Navigation Anchor (Based on JSON TopAppBar) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-100 dark:border-zinc-900">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-emerald-800 dark:text-emerald-400">timer</span>
<span class="mono-timer text-emerald-800 dark:text-emerald-400 font-bold text-lg">00:12:34</span>
</div>
<div class="flex flex-col items-center">
<span class="font-['Inter'] font-semibold tracking-tight text-lg text-on-surface">Session Recording</span>
<span class="text-[10px] text-on-surface-variant font-bold tracking-widest uppercase">8/15 组 2/4 项目</span>
</div>
<button class="text-emerald-800 dark:text-emerald-400 font-bold hover:opacity-70 transition-opacity active:scale-95 duration-150">Finish</button>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-md mx-auto space-y-6">
<!-- Drill Header Section -->
<section class="bg-surface-container-lowest rounded-xl p-4 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-20 h-14 bg-primary-container rounded-lg flex items-center justify-center overflow-hidden">
<img alt="Billiard table thumbnail" class="w-full h-full object-cover opacity-80" data-alt="overhead professional view of a green billiard table with focused lighting and a single white cue ball" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVhdIa2u4Y6ULZMFKDGzNvQnBc3uGXKoZESmBoiePwZUOywAOn3yaM6MdhqW1mg5HzrJaMumTPNOt8jw0UlJ-LjxZMrt_uolYMCgzTkRFFlOVEhKy_31ZA0StOWPJzDMTZ13U0YlNUENZNm8bGnFEaebYUFHNU--KHANNudZXk_D_kSLfekVIgDec2D4AqebvTqcNs8-gs0EDudRSLZVYztDejEStZdyCtt75aZOTXuZiA-BCP4eUta16AV2NUE3DHnD7ONYIt3ePf"/>
</div>
<div class="flex-1">
<h2 class="text-xl font-bold tracking-tight text-on-surface">五分点直球</h2>
<div class="flex items-center gap-2 mt-1">
<div class="h-1.5 flex-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[40%]"></div>
</div>
<span class="text-xs font-bold text-primary-container">进球 36/90</span>
</div>
</div>
</div>
</section>
<!-- Billiard Table Schematic (Collapsible) -->
<section class="bg-surface-container-low rounded-xl overflow-hidden">
<div class="p-3 flex justify-between items-center bg-surface-container-high/50">
<span class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Drill Schematic</span>
<span class="material-symbols-outlined text-sm">keyboard_arrow_up</span>
</div>
<div class="p-6 bg-primary-container/10 aspect-[16/9] relative">
<!-- Mock Diagram Representation -->
<div class="absolute inset-4 border-2 border-primary/20 rounded-sm">
<div class="absolute top-1/2 left-1/4 w-3 h-3 bg-white rounded-full border border-zinc-300"></div>
<div class="absolute top-1/2 right-1/4 w-3 h-3 bg-red-600 rounded-full"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-full h-px bg-white/40 border-dashed border-t"></div>
</div>
</div>
</div>
</section>
<!-- Mode & Settings -->
<section class="space-y-3">
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">history</span>
<span class="text-sm font-medium">Rest Settings</span>
</div>
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1 rounded-full">
<span class="text-xs font-bold text-on-surface">30s</span>
<span class="material-symbols-outlined text-xs">edit</span>
</div>
</div>
<div class="flex gap-2">
<button class="flex-1 py-2 bg-primary-container text-on-primary-container rounded-lg text-xs font-bold uppercase tracking-tighter">Normal Mode</button>
<button class="flex-1 py-2 bg-surface-container-highest text-on-surface-variant rounded-lg text-xs font-bold uppercase tracking-tighter">Timed Challenge</button>
</div>
</section>
<!-- Set Input Grid (Authority: Core Design Request) -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<div class="grid grid-cols-4 px-4 py-3 bg-surface-container-high/30 border-b border-surface-container text-[10px] font-extrabold uppercase tracking-widest text-on-surface-variant">
<span>Set</span>
<span class="text-center">In</span>
<span class="text-center">Total</span>
<span class="text-right">Complete</span>
</div>
<div class="divide-y divide-surface-container-low">
<!-- Completed Row -->
<div class="grid grid-cols-4 items-center px-4 py-4 bg-emerald-500/5">
<span class="text-sm font-bold text-on-surface-variant">1</span>
<div class="text-center">
<span class="text-sm font-bold text-primary-container">10</span>
</div>
<div class="text-center text-sm font-medium text-on-surface-variant">10</div>
<div class="text-right">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Active Row -->
<div class="grid grid-cols-4 items-center px-4 py-4 ring-2 ring-inset ring-primary-container/80 rounded-sm">
<span class="text-sm font-black text-primary-container">2</span>
<div class="text-center">
<div class="inline-flex items-center justify-center w-10 h-10 bg-surface-container-high rounded-lg font-bold text-lg">6</div>
</div>
<div class="text-center text-sm font-medium text-on-surface-variant">10</div>
<div class="text-right">
<button class="bg-secondary-container text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter">Save</button>
</div>
</div>
<!-- Future Rows -->
<div class="grid grid-cols-4 items-center px-4 py-4 opacity-50">
<span class="text-sm font-bold text-on-surface-variant">3</span>
<div class="text-center">
<div class="inline-flex items-center justify-center w-10 h-10 border border-dashed border-outline-variant rounded-lg font-bold text-lg text-outline-variant">0</div>
</div>
<div class="text-center text-sm font-medium text-on-surface-variant">10</div>
<div class="text-right">
<span class="material-symbols-outlined text-outline-variant">circle</span>
</div>
</div>
<div class="grid grid-cols-4 items-center px-4 py-4 opacity-30">
<span class="text-sm font-bold text-on-surface-variant">4</span>
<div class="text-center">
<div class="inline-flex items-center justify-center w-10 h-10 border border-dashed border-outline-variant rounded-lg font-bold text-lg text-outline-variant">0</div>
</div>
<div class="text-center text-sm font-medium text-on-surface-variant">10</div>
<div class="text-right">
<span class="material-symbols-outlined text-outline-variant">circle</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Based on JSON BottomNavBar) -->
<nav class="fixed bottom-0 w-full z-50 bg-white dark:bg-zinc-950 rounded-t-3xl shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
<div class="flex justify-around items-center px-8 pb-8 pt-4 w-full">
<button class="text-zinc-400 dark:text-zinc-600 p-4 hover:text-emerald-700 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="close_fullscreen">close_fullscreen</span>
</button>
<button class="text-zinc-400 dark:text-zinc-600 p-4 hover:text-emerald-700 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="description">description</span>
</button>
<!-- Active FAB Logic for adding session/data -->
<button class="bg-blue-600 dark:bg-blue-500 text-white rounded-full p-4 -mt-8 shadow-lg shadow-blue-500/30 scale-110 active:scale-90 transition-all duration-200 cubic-bezier(0.34,1.56,0.64,1)">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
<button class="text-zinc-400 dark:text-zinc-600 p-4 hover:text-emerald-700 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
</button>
<button class="text-zinc-400 dark:text-zinc-600 p-4 hover:text-emerald-700 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
</nav>
</body></html>
