<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#00210d",
                        "on-background": "#1a1c1f",
                        "surface-variant": "#e2e2e7",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e8e8ed",
                        "on-secondary-container": "#4e6b54",
                        "secondary-fixed": "#caebce",
                        "inverse-on-surface": "#f0f0f5",
                        "on-surface": "#1a1c1f",
                        "tertiary": "#782c38",
                        "outline-variant": "#bfc9be",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#05210f",
                        "on-primary-container": "#9ae9ae",
                        "background": "#f9f9fe",
                        "surface-tint": "#1b6c3d",
                        "tertiary-fixed-dim": "#ffb2b9",
                        "tertiary-container": "#96434f",
                        "outline": "#707a70",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#aeceb3",
                        "on-tertiary-container": "#ffcace",
                        "primary-container": "#1a6b3c",
                        "surface-container-highest": "#e2e2e7",
                        "secondary-container": "#caebce",
                        "secondary": "#48654e",
                        "surface-dim": "#d9dade",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#3f0110",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffd9dc",
                        "surface-bright": "#f9f9fe",
                        "on-surface-variant": "#404940",
                        "primary-fixed": "#a5f4b8",
                        "primary-fixed-dim": "#89d89e",
                        "surface-container": "#ededf2",
                        "on-primary-fixed-variant": "#005229",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#792d39",
                        "inverse-surface": "#2e3034",
                        "primary": "#005129",
                        "inverse-primary": "#89d89e",
                        "surface": "#f9f9fe",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#314d38",
                        "surface-container-low": "#f3f3f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f9f9fe;
        }
        .haptic-medium:active {
            transform: scale(0.95);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9fe]/80 backdrop-blur-md flex items-center justify-between px-4 h-11 w-full">
<div class="flex items-center">
<button class="haptic-medium text-[#005129] flex items-center justify-center p-2">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
</div>
<h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-[#005129]">手机号登录</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Content Canvas -->
<main class="pt-24 px-6 md:px-8 max-w-md mx-auto min-h-screen">
<!-- Instructional Header -->
<section class="mb-12">
<h2 class="text-[32px] font-bold text-on-surface tracking-tight mb-2">输入手机号</h2>
<p class="text-[15px] text-on-surface/60 font-normal">我们将发送短信验证码到您的手机</p>
</section>
<!-- Form Area -->
<div class="space-y-4">
<!-- Phone Input Area -->
<div class="flex items-center h-[52px] bg-surface-container-highest rounded-xl px-4 group focus-within:bg-white transition-colors">
<div class="flex items-center pr-3 border-r border-outline-variant/20 mr-4 haptic-medium cursor-pointer">
<span class="text-[17px] font-semibold text-on-surface">+86</span>
<span class="material-symbols-outlined text-[18px] ml-1 text-on-surface/40" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 text-[17px] placeholder:text-on-surface/30 text-on-surface" placeholder="请输入手机号" type="tel"/>
</div>
<!-- Verification Code Input Area -->
<div class="flex items-center h-[52px] bg-surface-container-highest rounded-xl px-4 group focus-within:bg-white transition-colors">
<input class="bg-transparent border-none focus:ring-0 w-full p-0 text-[17px] placeholder:text-on-surface/30 text-on-surface" placeholder="请输入验证码" type="number"/>
<button class="haptic-medium ml-2 px-4 py-1.5 rounded-full bg-[#1A6B3C]/10 text-[#1A6B3C] text-[15px] font-semibold whitespace-nowrap">
                    发送验证码
                </button>
</div>
<!-- Login Button (Disabled State) -->
<div class="pt-10">
<button class="w-full h-[50px] rounded-xl bg-on-background/10 text-on-surface/30 text-[17px] font-semibold cursor-not-allowed transition-all">
                    登录
                </button>
</div>
<!-- Help Link -->
<div class="pt-6 text-center">
<a class="text-[13px] text-on-surface/60 hover:text-primary transition-colors" href="#">
                    收不到验证码？
                </a>
</div>
</div>
<!-- Aesthetic Decoration (Tactile/Billiard Feel) -->
<div class="mt-20 flex justify-center opacity-10 pointer-events-none">
<div class="relative w-32 h-32">
<div class="absolute inset-0 rounded-full bg-primary blur-3xl"></div>
<div class="absolute inset-4 rounded-full border-4 border-primary"></div>
<div class="absolute inset-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-primary"></div>
</div>
</div>
</main>
<!-- Footnote / Branding Anchor -->
<footer class="fixed bottom-12 w-full text-center px-6 pointer-events-none">
<div class="flex flex-col items-center gap-1">
<span class="font-black text-[#005129] tracking-widest text-sm">球迹 · QIUJI</span>
<div class="w-1 h-1 rounded-full bg-[#005129]/30"></div>
</div>
</footer>
<!-- Image generation prompt for potential background subtle texture if needed -->
<div class="hidden" data-alt="ultra subtle macro photography of premium green billiard felt texture with soft natural lighting and elegant depth of field"></div>
</body></html>
