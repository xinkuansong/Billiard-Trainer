<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- Content Canvas -->
<main class="w-full max-w-md mx-auto flex-grow flex flex-col px-8 py-12">
<!-- Header / Brand Section -->
<div class="flex flex-col items-center mt-12 mb-16">
<div class="w-24 h-24 billiards-gradient rounded-[2.5rem] flex items-center justify-center mb-6 shadow-2xl shadow-primary/20 rotate-12">
<div class="-rotate-12">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">sports_score</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-3xl text-on-background tracking-tight text-center">
                The Precision Green
            </h1>
<p class="font-body text-on-surface-variant text-sm mt-2 text-center max-w-[240px]">
                Elevate your game with professional-grade billiards analytics.
            </p>
</div>
<!-- Login Actions Container -->
<div class="flex flex-col gap-4 w-full">
<!-- Login with WeChat (Primary Interaction) -->
<button class="w-full billiards-gradient text-white py-4 px-6 rounded-[1.5rem] flex items-center justify-between group active:scale-95 transition-all duration-200">
<div class="flex items-center gap-3">
<div class="bg-white/20 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
<span class="font-headline font-semibold">Login with WeChat</span>
</div>
<span class="material-symbols-outlined opacity-50 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Login with Phone Number -->
<button class="w-full bg-surface-container-lowest outline outline-[1.5px] outline-outline/15 text-on-surface py-4 px-6 rounded-[1.5rem] flex items-center justify-between group active:scale-95 transition-all duration-200">
<div class="flex items-center gap-3">
<div class="bg-surface-container-high p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-xl text-primary">smartphone</span>
</div>
<span class="font-headline font-semibold">Login with Phone Number</span>
</div>
<span class="material-symbols-outlined opacity-30 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Separator -->
<div class="flex items-center gap-4 my-4">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant/60 font-bold">Or</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
<!-- Continue as Guest -->
<button class="w-full bg-surface-container-low text-on-surface-variant py-4 px-6 rounded-[1.5rem] flex items-center justify-center group active:scale-95 transition-all duration-200">
<span class="font-headline font-semibold">Continue as Guest</span>
</button>
</div>
<!-- Visual Decorative Element (Bento-lite approach) -->
<div class="mt-12 relative w-full h-40 overflow-hidden rounded-[2rem] bg-surface-container-low group">
<div class="absolute inset-0 opacity-40">
<img class="w-full h-full object-cover" data-alt="Close-up of a perfectly polished cue ball on a lush deep green billiard table felt with soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsAL6XIi11UZsuG1erSVcAhJ6KbQDuMcHtcVrluCy6Y41rYua-Jpe2Ca8gwXeiwOJe89Dzw3VfLiMLdyKYDTUKVbkHRcN_4eGpb-ay42t9sG77itO1Uu8LhpVVcalzuuxCvmclscZXCYE451pk0uXRXVvjr9Z9VwUXsj0FXXOg6KKZuv99iOu53FrH_ts0eK98Z_DTG47nBriY9ri8cU-vvM6DqI9YBk7hu2fbv3-irHKZp7aG4lsddPAnZxOsJtinZ9gnvoccR5I"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-low to-transparent"></div>

<div>
<p class="text-[10px] font-label font-bold uppercase tracking-[0.2em] text-primary/70">Master Class</p>
<p class="font-headline font-bold text-on-surface text-lg leading-tight">Master the Table</p>
</div>
<div class="bg-primary p-2 rounded-full text-white shadow-lg">
<span class="material-symbols-outlined text-sm">play_arrow</span>
</div>
</div>

<a class="text-on-surface-variant text-sm font-label font-semibold underline underline-offset-4 decoration-outline-variant hover:text-primary transition-colors" href="#">

<p class="text-[10px] font-label text-on-surface-variant/40 text-center uppercase tracking-widest leading-relaxed">
