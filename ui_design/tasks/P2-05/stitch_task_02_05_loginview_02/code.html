<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>欢迎使用球迹 - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#1A6B3C",
                        "wechat": "#07C160",
                        "ios-gray": "rgba(60,60,67,0.6)",
                        "ios-handle": "rgba(60,60,67,0.3)",
                        "ios-border": "rgba(60,60,67,0.18)",
                        "surface": "#FFFFFF",
                        "on-surface": "#000000"
                    },
                    "borderRadius": {
                        "sheet": "12pt",
                        "btn": "12pt"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f2f2f7; /* iOS background color to show the sheet */
        }
    </style>
</head>
<body class="font-body text-on-surface antialiased min-h-screen flex items-end">
<!-- Sheet Modal Container -->
<div class="w-full bg-surface rounded-t-sheet shadow-2xl relative flex flex-col items-center px-8 pb-12 pt-2">
<!-- Drag Handle -->
<div class="w-[36pt] h-[5pt] bg-ios-handle rounded-[2.5pt] mt-[8pt] mb-10"></div>
<!-- Header Section -->
<div class="flex flex-col items-center mb-10">
<!-- App Icon: 72pt rounded square -->
<div class="w-[72pt] h-[72pt] bg-primary rounded-[16pt] flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-white text-[40pt]" style="font-variation-settings: 'FILL' 1;">sports_score</span>
</div>
<h1 class="text-[26pt] font-bold text-black text-center leading-tight">欢迎使用球迹</h1>
<p class="text-[15pt] text-ios-gray mt-2 text-center">登录以同步你的训练数据</p>
</div>
<!-- Button Stack -->
<div class="flex flex-col gap-[12pt] w-full max-w-sm">
<!-- Apple Button -->
<button class="w-full h-[50pt] bg-black text-white rounded-btn flex items-center justify-center gap-2 active:opacity-80 transition-opacity">
<svg class="w-5 h-5 fill-current" viewbox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
<path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"></path>
</svg>
<span class="text-[17pt] font-semibold">通过 Apple 登录</span>
</button>
<!-- WeChat Button -->
<button class="w-full h-[50pt] bg-wechat text-white rounded-btn flex items-center justify-center gap-2 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="text-[17pt] font-semibold">微信登录</span>
</button>
<!-- Phone Button -->
<button class="w-full h-[50pt] bg-white border-[1.5pt] border-ios-border text-black rounded-btn flex items-center justify-center active:bg-gray-50 transition-colors">
<span class="text-[17pt] font-semibold">手机号登录</span>
</button>
</div>
<!-- Footer -->
<div class="mt-8 flex flex-col items-center gap-12 w-full">
<button class="text-ios-gray text-[15pt] hover:text-black transition-colors">
                暂不登录，匿名使用
            </button>
<div class="text-center">
<p class="text-[12pt] text-ios-gray">登录即表示您同意</p>
<p class="text-[12pt] text-ios-gray">
<a class="underline decoration-ios-border" href="#">用户协议</a> 和 <a class="underline decoration-ios-border" href="#">隐私政策</a>
</p>
</div>
</div>
</div>
</body></html>
