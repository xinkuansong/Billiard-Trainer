name: QiuJi
options:
  bundleIdPrefix: com.xinkuan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: KWH2GRNSKG
    INFOPLIST_FILE: QiuJi/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic

targets:
  QiuJi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QiuJi
        excludes:
          - "**/.DS_Store"
          - "Resources/Drills/**"
          - "Resources/Plans/**"
    resources:
      - path: QiuJi/Resources/Assets.xcassets
      - path: QiuJi/Resources/Drills
        type: folder
      - path: QiuJi/Resources/Plans
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xinkuan.qiuji
        PRODUCT_NAME: 球迹
        INFOPLIST_FILE: QiuJi/Resources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: 球迹
        INFOPLIST_KEY_NSCameraUsageDescription: 拍摄训练视频
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 选择训练视频或图片
    info:
      path: QiuJi/Resources/Info.plist
      properties:
        CFBundleName: 球迹
        CFBundleDisplayName: 球迹
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSExceptionDomains:
            106.54.3.210:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        LSApplicationQueriesSchemes:
          - weixin
          - weixinULAPI
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "wx$(WECHAT_APP_ID)"
        API_BASE_URL: "$(API_BASE_URL)"
        WECHAT_APP_ID: "$(WECHAT_APP_ID)"
        WECHAT_UNIVERSAL_LINK: "$(WECHAT_UNIVERSAL_LINK)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - target: QiuJiLiveActivityExtension

  QiuJiLiveActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QiuJiLiveActivity
        excludes:
          - "**/.DS_Store"
    resources:
      - path: QiuJiLiveActivity/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xinkuan.qiuji.liveactivity
        PRODUCT_NAME: QiuJiLiveActivityExtension
        INFOPLIST_FILE: QiuJiLiveActivity/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"

  QiuJiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QiuJiTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xinkuan.qiuji.tests
    dependencies:
      - target: QiuJi

  QiuJiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: QiuJiUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xinkuan.qiuji.uitests
    dependencies:
      - target: QiuJi

schemes:
  QiuJi:
    build:
      targets:
        QiuJi: all
        QiuJiTests: [test]
        QiuJiUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: QiuJi/Resources/Products.storekit
    test:
      config: Debug
      targets:
        - QiuJiTests
        - QiuJiUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages: {}
